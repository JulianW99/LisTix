services:
  db:
    image: postgres:16-alpine
    container_name: listix-db
    restart: always
    environment:
      POSTGRES_DB: ticket_admin_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ticket_admin_mvp"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    env_file:
      - ./frontend/.env
    container_name: listix-backend
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4010
      NODE_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ticket_admin_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DATABASE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4173}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ticketadmin.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-A7!vN2@kR9-mT4_L8pW6xC3z}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Platform Admin}
      SYSTEM_ADMIN_EMAIL: ${SYSTEM_ADMIN_EMAIL:-systemadmin@listix.local}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD:-S9@qL4!mV7-rK2_N6xT8pC5w}
      SYSTEM_ADMIN_DISPLAY_NAME: ${SYSTEM_ADMIN_DISPLAY_NAME:-LisTix System Admin}
      PUSHOVER_APPLICATION_TOKEN: ${PUSHOVER_APPLICATION_TOKEN:-}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
    ports:
      - "4010:4010"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4010/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

  frontend:
    build:
      context: ./frontend
    container_name: listix-frontend
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://backend:4010
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
