services:
  db:
    image: postgres:16-alpine
    container_name: listix-db
    restart: always
    environment:
      POSTGRES_DB: ticket_admin_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: